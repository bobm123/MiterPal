name: miterpal
description: "Miter saw setting calculator for N-sided compound-miter (stave) box construction."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  # Debug-only device frame simulator (iPhone/Pixel sizes, safe areas,
  # orientation, dark mode) for previewing mobile layouts on desktop.
  device_preview: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
