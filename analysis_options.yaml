# Analyzer config for MiterPal. Uses only SDK-built-in lint rules (no extra
# package dependency), so `flutter pub get` stays dependency-free.
analyzer:
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_final_locals
    - prefer_final_fields
    - avoid_print
    - unnecessary_this
    - require_trailing_commas
