<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" font-family="sans-serif">
  <rect width="520" height="320" fill="#ffffff"/>
  <text x="260" y="28" font-size="16" font-weight="bold" text-anchor="middle">Side angle S — measured from vertical</text>

  <!-- LEFT: outward lean -->
  <g transform="translate(40,60)">
    <text x="100" y="0" font-size="13" font-weight="bold" text-anchor="middle">S &gt; 0 (splays outward)</text>
    <!-- ground -->
    <line x1="0" y1="200" x2="200" y2="200" stroke="#444" stroke-width="2"/>
    <!-- vertical reference -->
    <line x1="70" y1="200" x2="70" y2="40" stroke="#999" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="58" y="50" font-size="11" fill="#777" text-anchor="end">vertical</text>
    <!-- wall, tilting out to the right going up -->
    <line x1="70" y1="200" x2="115" y2="40" stroke="#8a5a2b" stroke-width="9" stroke-linecap="round"/>
    <text x="128" y="120" font-size="12" fill="#8a5a2b">wall</text>
    <!-- angle arc -->
    <path d="M 70 90 A 110 110 0 0 1 84.4 84.5" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="92" y="80" font-size="14" fill="#c0392b" font-weight="bold">S</text>
  </g>

  <!-- RIGHT: inward lean -->
  <g transform="translate(280,60)">
    <text x="100" y="0" font-size="13" font-weight="bold" text-anchor="middle">S &lt; 0 (slopes inward)</text>
    <line x1="0" y1="200" x2="200" y2="200" stroke="#444" stroke-width="2"/>
    <line x1="130" y1="200" x2="130" y2="40" stroke="#999" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="142" y="50" font-size="11" fill="#777">vertical</text>
    <!-- wall, tilting in to the left going up -->
    <line x1="130" y1="200" x2="85" y2="40" stroke="#8a5a2b" stroke-width="9" stroke-linecap="round"/>
    <text x="40" y="120" font-size="12" fill="#8a5a2b">wall</text>
    <path d="M 115.6 84.5 A 110 110 0 0 1 130 90" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="104" y="80" font-size="14" fill="#c0392b" font-weight="bold">S</text>
  </g>
</svg>
