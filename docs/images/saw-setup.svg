<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" font-family="sans-serif">
  <rect width="560" height="320" fill="#ffffff"/>
  <text x="280" y="28" font-size="16" font-weight="bold" text-anchor="middle">Saw settings — blade tilt B and miter angle M</text>

  <!-- LEFT: blade tilt, front view -->
  <g transform="translate(40,55)">
    <text x="110" y="0" font-size="13" font-weight="bold" text-anchor="middle">Blade tilt B (front view)</text>
    <!-- saw table -->
    <line x1="0" y1="200" x2="220" y2="200" stroke="#444" stroke-width="3"/>
    <text x="110" y="222" font-size="11" fill="#777" text-anchor="middle">saw table</text>
    <!-- vertical reference -->
    <line x1="110" y1="200" x2="110" y2="40" stroke="#999" stroke-width="1.5" stroke-dasharray="5 4"/>
    <!-- tilted blade -->
    <line x1="110" y1="200" x2="160" y2="50" stroke="#2c6fb3" stroke-width="7" stroke-linecap="round"/>
    <text x="168" y="55" font-size="12" fill="#2c6fb3">blade</text>
    <!-- arc -->
    <path d="M 110 90 A 110 110 0 0 1 126 86" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="132" y="82" font-size="14" fill="#c0392b" font-weight="bold">B</text>
  </g>

  <!-- RIGHT: miter angle, top view -->
  <g transform="translate(310,55)">
    <text x="115" y="0" font-size="13" font-weight="bold" text-anchor="middle">Miter angle M (top view)</text>
    <!-- fence -->
    <line x1="0" y1="50" x2="230" y2="50" stroke="#444" stroke-width="3"/>
    <text x="115" y="40" font-size="11" fill="#777" text-anchor="middle">fence</text>
    <!-- square reference (perpendicular to fence) -->
    <line x1="115" y1="50" x2="115" y2="220" stroke="#999" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="120" y="215" font-size="10" fill="#777">square</text>
    <!-- cut line at angle M from square -->
    <line x1="115" y1="50" x2="180" y2="210" stroke="#2c6fb3" stroke-width="3"/>
    <text x="185" y="205" font-size="12" fill="#2c6fb3">cut line</text>
    <!-- arc -->
    <path d="M 115 150 A 100 100 0 0 1 138 147" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="128" y="138" font-size="14" fill="#c0392b" font-weight="bold">M</text>
  </g>
</svg>
